<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuickSort Visual Input</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Fraunces:opsz,wght@9..144,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-shape shape-a" aria-hidden="true"></div>
  <div class="bg-shape shape-b" aria-hidden="true"></div>

  <main class="card">
    <p class="eyebrow">Algorithm Lab</p>
    <h1>QuickSort Playground</h1>
    <p class="subtitle">Enter numbers separated by commas or spaces, then sort them with QuickSort.</p>

    <label for="numbersInput">Input Array</label>
    <textarea id="numbersInput" rows="4" placeholder="Example: 10, 7, 8, 9, 1, 5">10, 7, 8, 9, 1, 5</textarea>

    <button id="sortBtn" type="button">Run QuickSort</button>

    <section class="result-block" aria-live="polite">
      <h2>Sorted Result</h2>
      <p id="status" class="status">Ready to sort.</p>
      <div id="result" class="result" role="status">-</div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
