<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Controls</title>
</head>

<body>
    <h1>Video Controls</h1>
    <video id="video" src="big_buck_bunny.mp4"></video>
    <br>

    <label id="lbl_seek_bar" for="bar_seek">00:00</label>
    <input type="range" id="bar_seek" value="0" min="0" max="60" step="0.01">

    <button id="btn_play">Play</button>
    <button id="btn_pause">Pause</button>
    <button id="btn_begin">&lt;&lt;</button>
    <button id="btn_end">&gt;&gt;</button>
    <button id="btn_seek_left">&lt;</button>
    <button id="btn_seek_right">&gt;</button>

    <label id="lbl_volume_bar" for="bar_volume">Volume</label>
    <input type="range" id="bar_volume" value="0" min="0" max="1" step="0.1">
    <button id="btn_mute">Mute</button>

    <label id="lbl_speed_bar" for="bar_speed">Speed</label>
    <input type="range" id="bar_speed" value="1" min="0.25" max="2" step="0.25">

    <script src="video_controls.js"></script>
</body>

</html>
