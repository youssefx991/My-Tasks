<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG Math</title>
</head>

<body>
    <h1>SVG Math</h1>

    <svg width="300" height="200">
        <polygon points="150,10 150,190 50,190" style="fill: red; stroke:black"/>        
    </svg>

    <br> <br>
    <math style="color: red;">
        <mrow>
            <mi>c</mi>
            <mo>=</mo>
            <msqrt>
                <mrow>
                    <msup>
                        <mi>a</mi>
                        <mn>2</mn>
                    </msup>
                </mrow>
                <mo>+</mo>
                <msup>
                    <mi>b</mi>
                    <mn>2</mn>
                </msup>
            </msqrt>
        </mrow>
    </math>
    <script src="svg_math.js"></script>
</body>

</html>
