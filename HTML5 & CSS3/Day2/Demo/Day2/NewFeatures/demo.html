        conditionizr.add('xyz',function(){
            return /google/i.test(navigator.vendor)
        })

        conditionizr.add('abc',function(){
            return navigator.userAgent.indexOf('Firefox')!=-1  && Modernizr.localstorage
        })

        conditionizr.add('test',function(){
            return !Modernizr.canvas
        })



        conditionizr.polyfill('ChromeScript.js',['xyz','test'])
        conditionizr.polyfill('FirefoxScript.js',['abc'])
