<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*
        container properties
        Justify-Content
        justify-items
        align-content
        align-items
        place-content
        place-items
        gap
        */
        .parent{
            background-color: aqua;
            display: grid;
            grid-template-columns: repeat(3,100px);
            /* grid-template-rows: 1fr 1fr; */
            grid-auto-rows: minmax(200px,auto);
             /* justify-items: flex-start; */
            /* justify-content: space-evenly; */
            min-height: 1500px;
            /* align-items: flex-end; */
            /* place-items: center; */
            /* align-content: space-evenly; */
            /* place-content: space-evenly; */
            gap: 100px 50px;

        }
        .parent>div{
            background-color: brown;
            margin: 10px;
            padding: 10px;
            color: white;
            font-size: 25px;
        }
        .child1,.child12{
            /* grid-column: span 3; */
            /* grid-column: 1/-1; */
            grid-column: 1/4;
            /* width: 50%; */
            /* justify-self: center; */
            /* align-self: center; */
            /* place-self: center; */
        }
        .child2{
            /* grid-row: span 2; */
            grid-row: 2/4;
        }
        .child3{
            /* grid-column: span 2;
            grid-row: span 2; */
        }
        .child11{
            grid-column: span 2;
        }
    </style>
</head>
<body>
    <div class="parent">
        <div class="child1">1</div>
        <div class="child2">2</div>
        <div class="child3">3</div>
        <div class="child4">4</div>
        <div class="child5">5</div>
        <div class="child6">6</div>
        <div class="child7">7</div>
        <div class="child8">8</div>
        <div class="child9">9</div>
        <div class="child10">10</div>
        <div class="child11">11</div>
        <div class="child12">12</div>
        
    </div>
</body>
</html>
