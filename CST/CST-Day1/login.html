<!DOCTYPE html>
<html lang="en">
<head>
    <title>Login Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="login-form">
    <form action="homepage2.html" method="get">
        <fieldset>
            <legend>Login</legend>
            <label for="user-name">User<u>n</u>ame:</label><br>
            <input type="text" id="user-name" name="username" placeholder="Enter user name" accesskey="n"><br><br>
            <label for="password">User <u>P</u>assword:</label><br>
            <input type="password" id="password" name="password" placeholder="Enter user password" accesskey="p"><br><br>
            <input type="checkbox" name="remember-me" id="rem-cb" accesskey="m"> <label for="rem-cb">Re<u>m</u>ember Me</label>
            <p id="login-button-area">
                <input type="submit" value="Sign In.." id="login-button" accesskey="s">
            </p>
        </fieldset>
    </form>
    </div>
</body>
</html>
