<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
</head>
<body>
    <h1>Register</h1>

    <span>Enter your name: </span> <input id="name" type="text"> <br>
    <span>Enter your age: </span> <input id="age" type="number"> <br>
    <p>Select your gender: </p>
    <input type="radio" name="gender", id="male_rb" checked>
    <img src="Task Resources\cookies\1.jpg" alt="">
    <img src="Task Resources\cookies\2.jpg" alt="">
    <input type="radio" name="gender", id="female_rb"> <br><br><br>

    <span>Select your favourite color</span> 
    <select name="favourite_color" id="fav_color_sb">
        <option value="red">Red</option>
        <option value="green">Green</option>
        <option value="blue">Blue</option>
    </select>
    
    <br><br>
    <input id="submit_btn" type="button" value="Submit"></button>

    <script src="register.js"></script>
    <script src="cookies.js"></script>
</body>
</html>
