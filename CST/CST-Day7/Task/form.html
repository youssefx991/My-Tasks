<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    <h1>Form</h1>
    <form id="form_id" action="after_form.html">
        Name: <input type="text" id="name" name="name"> <br>
        Title: <input type="text" id="title" name="title"> <br>
        Address: <input type="text" id="address" name="address"> <br>
        Gender: 
        <input type="radio" name="gender" id="male_rb" value="male"> Male 
        <input type="radio" name="gender" id="female_rb" value="female"> Female<br>
        Email: <input type="email" id="email" name="email"> <br>
        Mobile: <input type="text" id="mobile" name="mobile"> <br>
        <button id="submit_btn" type="submit">Submit</button>
    </form>

    <script src="form.js"></script>
</body>
</html>
