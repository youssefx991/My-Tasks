<body>
    <script>
        let num1 = Number(prompt("Enter first number: "));
        let num2 = Number(prompt("Enter second number: "));

        if (!isNaN(num1) && !isNaN(num2)){
            console.log(num1 == num2 ? 'both equal' : (num1>num2 ? num1 : num2));
            
        }
        else{
            console.log("ERROR - only enter numbers")
        }
    </script>
