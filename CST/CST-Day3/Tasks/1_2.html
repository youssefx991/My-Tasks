<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2</title>
</head>

<body>
    <script>
        let sum = 0;

        while (true) {
            let num = Number(prompt("Enter number (0 to stop): "));
            if (isNaN(num)) {
                alert("error - you should only enter numbers");
                continue;
            }

            sum += num;
            if (num == 0 || sum > 100)
                break;
        }

        console.log("Total Sum: " + sum);

    </script>
</body>

</html>
