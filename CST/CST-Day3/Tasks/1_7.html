<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7</title>
</head>

<body>
    <script>
        while (true) {
            let x = Number(prompt('enter first number: '));
            let y = Number(prompt('enter second number: '));
            let z = prompt('enter one of the following (even - odd - no): ');
            let sum = 0;
            let mod;
            let out = ""
            let found = false;

            if (!isNaN(x) && !isNaN(y)) {
                if (z == 'odd')
                    mod = 1;
                else if (z == 'even')
                    mod = 0;
                else if (z == 'no')
                    mod = 3;
                else {
                    console.log('ERROR in last input - only enter one of specified values');
                    continue;
                }

                if (x <= y) {
                    for (let i = x; i <= y; i++) {
                        if (i % 2 == mod || mod == 3) {

                            out += (found ? ', ' + i : i);
                            found = true;
                            sum += i;
                        }
                    }
                } else { // x > y
                    for (let i = x; i >= y; i--) {
                        if (i % 2 == mod || mod == 3) {

                            out += (found ? ', ' + i : i);
                            found = true;
                            sum += i;
                        }
                    }
                }

                console.log(
                    "%cValues: " + out,
                    "color: white; font-size: 20px;"
                );


                console.log(
                    "%cTotal Sum: " + sum,
                    "color: green; font-weight: bold;"
                );


                break;
            }
            else {
                alert("ERROR - only numbers in firs two fields and string in last field");
            }
        }

    </script>
</body>

</html>
